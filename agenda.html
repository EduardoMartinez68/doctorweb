<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta | Estilo Odoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #4c4c4c;
        }
        /* Estilo de Barra Superior Odoo */
        .odoo-header {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        .breadcrumb-item + .breadcrumb-item::before { content: "/"; }
        
        /* Tarjeta tipo "Hoja de Papel" */
        .odoo-sheet {
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 2px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 1100px;
            margin: 0 auto 40px auto;
        }

        .odoo-status-bar {
            border-bottom: 1px solid #dee2e6;
            margin: -40px -40px 30px -40px;
            padding: 10px 40px;
            background: #f8f9fa;
            display: flex;
            justify-content: flex-end;
            gap: 5px;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #e2e7f0;
        }

        /* Inputs minimalistas */
        .form-control, .form-select {
            border: none;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
            padding-left: 0;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-bottom: 2px solid #714B67; /* Color morado Odoo */
        }

        .odoo-label {
            font-weight: 600;
            color: #000;
            font-size: 0.9rem;
        }

        /* Tabla de items */
        .table thead th {
            border-top: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
        }

        .btn-odoo-primary {
            background-color: #714B67;
            border-color: #714B67;
            color: white;
        }
        .btn-odoo-primary:hover {
            background-color: #5a3c52;
            color: white;
        }

        #signature-canvas {
            border: 1px dashed #ccc;
            background: #fcfcfc;
        }
    </style>
</head>
<body>

<nav class="odoo-header d-flex justify-content-between align-items-center">
    <div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Ventas</a></li>
                <li class="breadcrumb-item active fw-bold">Nueva Orden</li>
            </ol>
        </nav>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-odoo-primary btn-sm px-3">GUARDAR</button>
        <button class="btn btn-outline-secondary btn-sm px-3">DESCARTAR</button>
    </div>
</nav>

<div class="container">
    <div class="odoo-sheet">
        <div class="odoo-status-bar">
            <span class="status-badge text-primary" style="background: #e0e7ff;">COTIZACIÓN</span>
            <span class="status-badge">ORDEN DE VENTA</span>
            <span class="status-badge">PAGADO</span>
        </div>

        <div class="row mb-5">
            <div class="col-md-6">
                <h1 class="h3 mb-4">Nueva Venta</h1>
                
                <div class="row mb-3">
                    <label class="col-sm-4 odoo-label">Paciente</label>
                    <div class="col-sm-8">
                        <select class="form-select">
                            <option>Seleccione un paciente...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-6 border-start ps-4">
                <div class="row mb-3">
                    <label class="col-sm-4 odoo-label">Fecha de Venta</label>
                    <div class="col-sm-8">
                        <input type="date" class="form-control" value="2024-05-22">
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-4 odoo-label">Clínica</label>
                    <div class="col-sm-8">
                        <select class="form-select">
                            <option>Sede Central</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
          <li class="nav-item">
            <button class="nav-link active text-dark fw-bold" data-bs-toggle="tab" data-bs-target="#lineas">Líneas de la orden</button>
          </li>
          <li class="nav-item">
            <button class="nav-link text-muted" data-bs-toggle="tab" data-bs-target="#pagos">Información de Pago</button>
          </li>
          <li class="nav-item">
            <button class="nav-link text-muted" data-bs-toggle="tab" data-bs-target="#notas">Notas</button>
          </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="lineas">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Servicio</th>
                            <th>Descripción</th>
                            <th class="text-end">Cantidad</th>
                            <th class="text-end">Precio Unit.</th>
                            <th class="text-end">Descuento (%)</th>
                            <th class="text-end">Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="width: 25%;">
                                <select class="form-select form-select-sm">
                                    <option>Consulta Médica</option>
                                </select>
                            </td>
                            <td><input type="text" class="form-control form-control-sm" placeholder="..."></td>
                            <td class="text-end" style="width: 10%;"><input type="number" class="form-control form-control-sm text-end" value="1"></td>
                            <td class="text-end" style="width: 12%;">$ 500.00</td>
                            <td class="text-end" style="width: 12%;"><input type="number" class="form-control form-control-sm text-end" value="0.00"></td>
                            <td class="text-end fw-bold">$ 500.00</td>
                            <td class="text-end"><i class="bi bi-trash text-muted"></i></td>
                        </tr>
                    </tbody>
                </table>
                <button class="btn btn-link text-decoration-none p-0 text-primary">+ Agregar línea</button>
            </div>

            <div class="tab-pane fade" id="pagos">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-4">
                            <label class="odoo-label mb-2">Método de Pago</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="pay" id="cash" checked>
                                    <label class="form-check-label" for="cash">Efectivo</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="pay" id="card">
                                    <label class="form-check-label" for="card">Tarjeta</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="odoo-label">Recibido por:</label>
                            <input type="text" class="form-control" placeholder="Nombre del cajero">
                        </div>
                    </div>
                    <div class="col-md-6 text-center">
                        <label class="odoo-label d-block mb-2">Firma del Paciente (JSON Data)</label>
                        <canvas id="signature-canvas" class="signature-pad w-100 h-75"></canvas>
                        <small class="text-muted">Dibuje su firma arriba</small>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="notas">
                <textarea class="form-control border" rows="4" placeholder="Notas internas o términos y condiciones..."></textarea>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-7"></div>
            <div class="col-md-5">
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span class="odoo-label">Subtotal</span>
                    <span>$ 500.00</span>
                </div>
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span class="odoo-label">Descuentos</span>
                    <span>$ 0.00</span>
                </div>
                <div class="d-flex justify-content-between py-2 mb-3">
                    <span class="h4 odoo-label">Total</span>
                    <span class="h4 fw-bold text-dark">$ 500.00</span>
                </div>
                <button class="btn btn-odoo-primary w-100 py-2 fw-bold">CONFIRMAR VENTA Y PAGO</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
