<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - DentyCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
/* --- Paleta de Colores Médica Moderna --- */
:root {
    --medical-blue: #0ea5e9;
    --medical-bg: #f8fafc;
    --border-color: #e2e8f0;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --white: #ffffff;
}

/* --- Contenedor Principal --- */
#calendar {
    max-width: 1200px;
    margin: 20px auto;
    padding: 30px;
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    font-family: 'Inter', -apple-system, sans-serif;
}

/* --- Personalización de FullCalendar (Headers y Botones) --- */
.fc .fc-toolbar-title {
    font-size: 1.5rem !important;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.02em;
}

.fc .fc-button {
    background-color: var(--white) !important;
    border: 1px solid var(--border-color) !important;
    color: var(--text-muted) !important;
    font-weight: 500;
    text-transform: capitalize;
    transition: all 0.2s ease;
    padding: 8px 16px;
    box-shadow: none !important;
}

.fc .fc-button:hover {
    background-color: var(--medical-bg) !important;
    color: var(--medical-blue) !important;
}

.fc .fc-button-active {
    background-color: var(--medical-blue) !important;
    border-color: var(--medical-blue) !important;
    color: var(--white) !important;
}

/* --- Grilla del Calendario --- */
.fc-theme-standard td, .fc-theme-standard th {
    border: 1px solid #f1f5f9 !important;
}

.fc-col-header-cell {
    padding: 12px 0 !important;
    background-color: var(--medical-bg);
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
}

/* --- Estilo de los Eventos (Citas) --- */
.fc-event {
    border: none !important;
    border-left: 4px solid transparent !important; /* Indicador de color lateral */
    padding: 4px 8px !important;
    margin: 2px 4px !important;
    border-radius: 6px !important;
    font-size: 0.85rem !important;
    font-weight: 500 !important;
    transition: transform 0.1s ease;
}

.fc-event:hover {
    transform: translateY(-1px);
    filter: brightness(0.95);
}

/* Variaciones suaves de color para las citas */
.fc-event-main {
    color: #1e293b !important; /* Texto oscuro para legibilidad sobre colores claros */
}

/* --- Vista de Hoy --- */
.fc-day-today {
    background-color: rgba(14, 165, 233, 0.03) !important;
}

.fc-daygrid-day-number {
    color: var(--text-muted);
    font-weight: 500;
    padding: 10px !important;
}

/* --- Modal de Bootstrap (Match con el estilo) --- */
.modal-content {
    border: none;
    border-radius: 12px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
}

.modal-header {
    border-bottom: 1px solid var(--border-color);
    background-color: var(--medical-bg);
}

.modal-title {
    font-weight: 700;
    color: var(--text-main);
}

        #calendar {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* Estilo para que el evento se vea más limpio */
        .fc-event {
            cursor: pointer;
            padding: 2px 5px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <h2 class="text-center my-4">Gestión de Citas Médicas</h2>
        <div id="calendar"></div>
    </div>

    <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Detalle de la Cita</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const eventModal = new bootstrap.Modal(document.getElementById('eventModal'));

    // --- SIMULACIÓN DE BACKEND ---
    // Esta función imita una petición fetch()
    const getEventsFromBackend = () => {
        return new Promise((resolve) => {
            setTimeout(() => {
                resolve([
                    {
                        title: 'Limpieza Dental',
                        start: '2026-03-28T10:00:00',
                        end: '2026-03-28T11:00:00',
                        backgroundColor: '#0d6efd', // Azul Bootstrap
                        extendedProps: {
                            doctor: 'Dr. Arriaga',
                            paciente: 'Juan Pérez',
                            consultorio: 'A-1'
                        }
                    },
                    {
                        title: 'Extracción',
                        start: '2026-03-29T14:30:00',
                        end: '2026-03-29T16:00:00',
                        backgroundColor: '#dc3545', // Rojo Bootstrap
                        extendedProps: {
                            doctor: 'Dra. García',
                            paciente: 'María López',
                            consultorio: 'B-3'
                        }
                    },
                    {
                        title: 'Revisión General',
                        start: '2026-03-30T09:00:00',
                        end: '2026-03-30T10:00:00',
                        backgroundColor: '#198754', // Verde Bootstrap
                        extendedProps: {
                            doctor: 'Dr. Arriaga',
                            paciente: 'Carlos Ruiz',
                            consultorio: 'A-1'
                        }
                    }
                ]);
            }, 500); // Simula medio segundo de carga
        });
    };

    // --- CONFIGURACIÓN DEL CALENDARIO ---
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es', // Idioma español
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        // Cargamos los eventos llamando a nuestra función simulada
        events: function(info, successCallback, failureCallback) {
            getEventsFromBackend().then(data => {
                successCallback(data);
            });
        },
        // Acción al hacer clic en un evento
        eventClick: function(info) {
            const props = info.event.extendedProps;
            document.getElementById('modalTitle').innerText = info.event.title;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Paciente:</strong> ${props.paciente}</p>
                <p><strong>Doctor:</strong> ${props.doctor}</p>
                <p><strong>Hora:</strong> ${info.event.start.toLocaleTimeString()}</p>
                <p><strong>Consultorio:</strong> ${props.consultorio}</p>
            `;
            eventModal.show();
        }
    });

    calendar.render();
});
    </script>
</body>
</html>
