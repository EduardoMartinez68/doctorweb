<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Form Builder Médico PRO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #0f172a; color: #e2e8f0; }
.builder-area { min-height: 80vh; border: 2px dashed #334155; padding: 20px; border-radius: 10px; }
.card-custom { background: #1e293b; border: none; }
.toolbox { background: #020617; border-left: 1px solid #334155; height: 100vh; position: fixed; right: 0; top: 0; width: 320px; padding: 20px; overflow:auto; }
.toolbox button { width: 100%; margin-bottom: 10px; }
.selected { outline: 2px solid #38bdf8; }
label{
    color: white;
}
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-9">
      <h3 class="mt-3">Editor de Formularios</h3>
      <div id="builder" class="builder-area"></div>
    </div>
  </div>
</div>

<div class="toolbox">
  <h5>Herramientas</h5>
  <button class="btn btn-primary" onclick="addRow()">+ Row</button>
  <button class="btn btn-secondary" onclick="addCol()">+ Col</button>

  <hr>

  <button class="btn btn-success" onclick="addField('text')">Input Texto</button>
  <button class="btn btn-success" onclick="addField('number')">Número</button>
  <button class="btn btn-success" onclick="addField('email')">Email</button>
  <button class="btn btn-success" onclick="addField('date')">Fecha</button>
  <button class="btn btn-warning" onclick="addField('select')">Select</button>
  <button class="btn btn-warning" onclick="addField('checkbox')">Checkbox</button>

  <hr>

  <button class="btn btn-danger" onclick="deleteSelected()">Eliminar seleccionado</button>

  <hr>

  <div id="configPanel"></div>
</div>

<script>
let state = { rows: [] };
let selected = null;

// Render UI
function render() {
  const builder = document.getElementById('builder');
  builder.innerHTML = '';

  state.rows.forEach((row) => {
    let rowDiv = document.createElement('div');
    rowDiv.className = 'row mb-3';

    if (selected === row) rowDiv.classList.add('selected');

    rowDiv.onclick = (e) => {
      e.stopPropagation();
      selected = row;
      render();
      renderConfig();
    };

    row.cols.forEach((col) => {
      let colDiv = document.createElement('div');
      colDiv.className = 'col border p-2';

      if (selected === col) colDiv.classList.add('selected');

      colDiv.onclick = (e) => {
        e.stopPropagation();
        selected = col;
        render();
        renderConfig();
      };

      col.fields.forEach((field) => {
        let fieldDiv = document.createElement('div');
        fieldDiv.className = 'card card-custom p-2 mb-2';

        if (selected === field) fieldDiv.classList.add('selected');

        fieldDiv.onclick = (e) => {
          e.stopPropagation();
          selected = field;
          render();
          renderConfig();
        };

        fieldDiv.innerHTML = generatePreview(field);
        colDiv.appendChild(fieldDiv);
      });

      rowDiv.appendChild(colDiv);
    });

    builder.appendChild(rowDiv);
  });
}

// Preview dinámico
function generatePreview(field) {
  if (field.type === 'select') {
    let options = field.options.map(o => `<option>${o}</option>`).join('');
    return `<label>${field.label}</label><select class='form-control'>${options}</select>`;
  }

  if (field.type === 'checkbox') {
    return `<div class='form-check'><input type='checkbox'><label>${field.label}</label></div>`;
  }

  return `<label>${field.label}</label><input type='${field.type}' placeholder='${field.placeholder}' class='form-control'>`;
}

// Crear elementos
function addRow() {
  state.rows.push({ cols: [] });
  render();
}

function addCol() {
  if (!state.rows.length) return alert('Agrega una row primero');
  state.rows[state.rows.length - 1].cols.push({ fields: [] });
  render();
}

function addField(type) {
  if (!selected || !selected.fields) return alert('Selecciona una columna');

  const field = {
    label: 'Campo',
    name: '',
    placeholder: '',
    type,
    required: false,
    options: []
  };

  selected.fields.push(field);
  selected = field;
  render();
  renderConfig();
}

// Config panel
function renderConfig() {
  const panel = document.getElementById('configPanel');

  if (!selected) return panel.innerHTML = '<p>Selecciona algo</p>';

  // FIELD
  if (!selected.cols && !selected.fields) {
    panel.innerHTML = `
      <h6>Campo</h6>
      <input class='form-control mb-2' placeholder='Label' value='${selected.label}' oninput="updateField('label', this.value)">
      <input class='form-control mb-2' placeholder='Name' value='${selected.name}' oninput="updateField('name', this.value)">
      <input class='form-control mb-2' placeholder='Placeholder' value='${selected.placeholder}' oninput="updateField('placeholder', this.value)">
      <select class='form-control mb-2' onchange="updateField('type', this.value)">
        <option value='text'>Text</option>
        <option value='number'>Number</option>
        <option value='email'>Email</option>
        <option value='date'>Date</option>
        <option value='select'>Select</option>
        <option value='checkbox'>Checkbox</option>
      </select>
      ${selected.type === 'select' ? `
        <input class='form-control mb-2' placeholder='Opciones' value='${selected.options.join(',')}' oninput="updateOptions(this.value)">
      ` : ''}
      <div class='form-check'>
        <input type='checkbox' ${selected.required?'checked':''} onchange="updateField('required', this.checked)">
        <label>Requerido</label>
      </div>
    `;
    return;
  }

  // COLUMN
  if (selected.fields) {
    panel.innerHTML = `<h6>Columna</h6><p>Puedes agregar campos aquí</p>`;
    return;
  }

  // ROW
  if (selected.cols) {
    panel.innerHTML = `<h6>Row</h6><p>Puedes agregar columnas aquí</p>`;
    return;
  }
}

// Updates
function updateField(key, value) {
  selected[key] = value;
  render();
  //renderConfig();
}

function updateOptions(val) {
  selected.options = val.split(',');
  render();
}

// Delete
function deleteSelected() {
  if (!selected) return;

  state.rows.forEach(row => {
    row.cols = row.cols.filter(col => col !== selected);
    row.cols.forEach(col => {
      col.fields = col.fields.filter(f => f !== selected);
    });
  });

  state.rows = state.rows.filter(r => r !== selected);

  selected = null;
  render();
  renderConfig();
}

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete') {
    deleteSelected();
  }
});

</script>

</body>
</html>
