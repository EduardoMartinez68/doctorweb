<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Médico Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --med-primary: #00a8a8; /* Verde menta quirúrgico */
            --med-bg: #f8fafc;     /* Fondo grisáceo muy tenue */
            --med-text: #334155;
            --med-border: #e2e8f0;
        }

        body {
            background-color: var(--med-bg);
            font-family: 'Inter', sans-serif;
            color: var(--med-text);
        }

        .form-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Estilo de los inputs */
        .form-control, .form-select {
            border: 1px solid var(--med-border);
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--med-primary);
            box-shadow: 0 0 0 4px rgba(0, 168, 168, 0.1);
            outline: none;
        }

        /* Divisores de Sección Modernos */
        .section-header {
            background: linear-gradient(90deg, #f1f5f9 0%, #ffffff 100%);
            padding: 12px 20px;
            border-left: 4px solid var(--med-primary);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--med-text);
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }

        /* Acordeón Minimalista (Desplegables) */
        .accordion-item {
            border: none;
            margin-bottom: 15px;
        }

        .accordion-button {
            background-color: white !important;
            color: var(--med-text) !important;
            font-weight: 600;
            border: 1px solid var(--med-border) !important;
            border-radius: 12px !important;
            box-shadow: none !important;
        }

        .accordion-button:not(.collapsed) {
            border-bottom: none !important;
            border-bottom-left-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
        }

        .accordion-body {
            border: 1px solid var(--med-border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            background-color: #fff;
        }

        .btn-medical {
            background-color: var(--med-primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn-medical:hover {
            opacity: 0.9;
            color: white;
        }
    </style>


</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4 text-center fw-light">Expediente <span class="fw-bold text-primary">Médico</span></h2>

        <div class="section-header">Información del Paciente</div>
        <div class="row g-3 mb-5">
            <div class="col-md-6">
                <label class="form-label small text-muted">Nombre Completo</label>
                <input type="text" class="form-control" placeholder="Ej. Juan Pérez">
            </div>
            <div class="col-md-6">
                <label class="form-label small text-muted">Número de Colegiado (Opcional)</label>
                <input type="text" class="form-control" placeholder="ID-0000">
            </div>
        </div>

        <div class="accordion" id="accordionExample">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
                        Antecedentes Clínicos Detallados
                    </button>
                </h2>
                <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                    <div class="accordion-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small text-muted">Alergias Conocidas</label>
                                <textarea class="form-control" rows="3"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Tipo de Sangre</label>
                                <select class="form-select">
                                    <option selected>Seleccionar...</option>
                                    <option>O+</option>
                                    <option>A+</option>
                                    <option>B+</option>
                                    <option>AB+</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Última Cirugía</label>
                                <input type="date" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5 d-grid">
            <button class="btn btn-medical shadow-sm">Guardar Registro Clínico</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
